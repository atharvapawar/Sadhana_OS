kind = "web"
previewPath = "/"
title = "Sadhana OS"
version = "1.0.0"
id = "artifacts/sadhana-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19420

[services.development]
run = "pnpm --filter @workspace/sadhana-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sadhana-os", "run", "build" ]
publicDir = "artifacts/sadhana-os/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19420"
BASE_PATH = "/"
