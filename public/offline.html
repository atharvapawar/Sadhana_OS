<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#120c06" />
    <title>Sadhana OS — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.16), transparent 32rem),
          linear-gradient(135deg, #120c06, #1c140c 48%, #090706);
        color: #f8ecd8;
      }
      main {
        width: min(680px, 100%);
        border: 1px solid rgba(245, 158, 11, 0.24);
        border-radius: 32px;
        padding: clamp(28px, 7vw, 56px);
        background: rgba(20, 14, 8, 0.78);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      }
      .eyebrow {
        margin: 0 0 14px;
        font-size: 0.72rem;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #fbbf24;
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }
      p {
        max-width: 56ch;
        margin: 22px 0 0;
        color: #dccab0;
        font-size: 1rem;
        line-height: 1.75;
      }
      a, button {
        margin-top: 28px;
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(245, 158, 11, 0.35);
        padding: 0 18px;
        background: rgba(245, 158, 11, 0.12);
        color: #fde68a;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Sadhana OS</p>
      <h1>The temple is offline.</h1>
      <p>
        Your connection appears unavailable. Reconnect and refresh to continue the Yogic River from Misidentification to Living Awareness.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
